services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
    container_name: ebooking_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - ebooking

  nginx:
    image: nginx:1.27-alpine
    container_name: ebooking_nginx
    restart: unless-stopped
    ports:
      - "18000:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - ebooking

  mysql:
    image: mysql:8.4
    container_name: ebooking_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ebooking_court
      MYSQL_USER: ebooking_user
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - ebooking

  phpmyadmin:
    image: phpmyadmin:5.2.2-apache
    container_name: ebooking_phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: root
    ports:
      - "18081:80"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - ebooking

volumes:
  mysql_data:

networks:
  ebooking:
    driver: bridge
